services:
  - type: web
    name: docu-ai
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt && reflex init
    startCommand: reflex run --env prod --backend-host 0.0.0.0
    envVars:
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: docu-ai-data
      mountPath: /opt/render/project/src
      sizeGB: 1
